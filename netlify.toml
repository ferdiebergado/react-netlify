# Route API endpoints directly to Netlify Functions
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

# Catch-all rule for the React SPA router
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[edge_functions]]
path = "/api/*"
function = "csrf"

[[edge_functions]]
path = "/"
function = "session"

[[edge_functions]]
path = "/api/*"
excludedPath = ["/api/signin", "/api/oauthcallback"]
function = "session"

[[edge_functions]]
path = "/api/*"
function = "json"

[[headers]]
for = "/index.html"
[headers.values]
X-Frame-Options = "DENY"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"

[[context.production.headers]]
for = "/index.html"
[context.production.headers.values]
Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' https://accounts.google.com; img-src 'self' https://*.googleusercontent.com data:; font-src 'self'; connect-src 'self' https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'none'; form-action 'self'; worker-src 'self'; upgrade-insecure-requests;"
