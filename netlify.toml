# Route API endpoints directly to Netlify Functions
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

# Catch-all rule for the React SPA router
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[edge_functions]]
path = "/api/*"
function = "csrf"

[[edge_functions]]
path = "/"
function = "session"

[[edge_functions]]
path = "/api/*"
excludedPath = ["/api/signin", "/api/oauthcallback"]
function = "session"

[[edge_functions]]
path = "/api/*"
function = "json"

[[edge_functions]]
path = "/"
function = "csp"

[[headers]]
for = "/"
[headers.values]
X-Frame-Options = "DENY"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
